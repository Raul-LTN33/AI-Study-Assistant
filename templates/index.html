<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>AI Study Tool</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 25px;
        }

        input[type="file"] {
            padding: 10px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .output {
            margin-top: 30px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;

            white-space: pre-wrap;
            text-align: left;
            line-height: 1.6;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>AI Study Assistant</h1>

    <form id="form">
        <input type="file" name="file" />
        <br>
        <button type="submit">Upload PDF</button>
    </form>

    <div id="output" class="output"></div>

</div>

<script>
    const form = document.getElementById("form");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(form);

        const res = await fetch("/upload/", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        document.getElementById("output").innerText = data.result;
    });
</script>

</body>
</html>
